<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Date & Time</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      background: #f7f9fc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }

    .container {
      background: #fff;
      padding: 2rem;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      text-align: center;
      width: 420px;
    }

    h2 {
      margin-bottom: 1.5rem;
      color: #111;
      font-size: 1.5rem;
      font-weight: bold;
    }

    label {
      display: block;
      text-align: left;
      margin: 0.5rem 0;
      font-weight: 500;
      color: #333;
    }

    input[type="date"],
    input[type="time"] {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1.2rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border 0.3s;
    }

    input:focus {
      border-color: #ff3d00;
      box-shadow: 0 0 6px rgba(255, 61, 0, 0.3);
    }

    button {
      width: 100%;
      background: #ff3d00;
      color: #fff;
      font-weight: bold;
      border: none;
      padding: 0.9rem;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
      font-size: 1rem;
      margin-top: 0.5rem;
    }

    button:hover {
      background: #e53935;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Select Date & Time</h2>
    <form method="POST" action="">
  <label for="date">Choose Date:</label>
  <input type="date" id="date" name="date" required>

  <label for="start_time">Start Time:</label>
  <input type="time" id="start_time" name="start_time" required>

  <label for="end_time">End Time:</label>
  <input type="time" id="end_time" name="end_time" required>

  <button type="submit">Confirm Booking</button>
</form>

  </div>

</body>
</html>
